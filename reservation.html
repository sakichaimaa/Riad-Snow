<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Reservation Riad</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            
            
            font-family:  sans-serif;
           
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e3e8ef 0%, #cbd5e1 100%);
            position: relative;
            
        }
        /* Animated glowing gradient borders */
        body::before {
            content: '';
            position: fixed;
            left: 0;
            top: 0;
            width: 12px;
            height: 100%;
            
            z-index: 1000;
            animation: glowPulse 3s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            right: 0;
            top: 0;
            width: 12px;
            height: 100%;
            z-index: 1000;
            animation: glowPulse 3s ease-in-out infinite 1.5s;
        }

        

        .container {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            background: #e3e8ef;
            border-radius: 50px;
            box-shadow: 
                20px 20px 70px #8d1818c0,
                -20px -20px 60px #ffffff;
            position: relative;
            gap: 250px;
            display: flex;
        }
        #toggle {
            display: none;
        }
        /* Luxury Rooms Form (LEFT) */
        .left-panel {
            
            
            padding: 40px;
            margin-right: 30px;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        /* Premium Suites Form (RIGHT) */
        .right-panel {
            
            padding: 40px;
            margin-right: 30px;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        /* Fade effect on panels */
        #toggle:checked ~ .left-panel {
            opacity: 0.3;
            pointer-events: none;
        }
        #toggle:not(:checked) ~ .right-panel {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Overlay slides from RIGHT to LEFT */
        .overlay-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 62%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }

        .overlay {
            background: linear-gradient(135deg, #8B0000 0%, #5a0000 100%);
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 220px 50px 50px 220px;
            overflow: hidden;
        }

        /* Curtain texture */
        .overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    rgba(0, 0, 0, 0.1) 2px,
                    transparent 4px
                );
            pointer-events: none;
            opacity: 0.3;
        }
        .overlay-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: #fff;
            text-align: center;
            transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Initially show "Luxury Rooms" on right */
        .overlay-right {
            opacity: 1;
            
            transform: translateX(0) scale(1);
        }
        .overlay-left {
            opacity: 0;
            transform: translateX(-50px) scale(0.9);

        }
        /* When toggle checked, slide overlay to LEFT */
        #toggle:checked ~ .overlay-container {
            transform: translateX(-60%);
        }
        #toggle:checked ~ .overlay-container .overlay {
            border-radius: 40px 220px 220px 40px;

        }
        /* Swap overlay text */
        #toggle:checked ~ .overlay-container .overlay-right {
            opacity: 0;
            transform: translateX(80px) scale(0.8);
        }
        #toggle:checked ~ .overlay-container .overlay-left {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        .overlay h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            }
            50% {
                text-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 0 40px rgba(212, 175, 55, 0.4);
            }
        }

        .overlay p {
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .overlay-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #d4af37;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .overlay-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .overlay-btn:hover::before {
            width: 300px;
            height: 300px;
            
        }
        .overlay-btn:hover {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }

        /* Neomorphic Form Elements */
        .form-title {
            font-size: 32px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 10px;
            text-align: center;
        }
        .category-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37, #f0c74b);
            color: #000000;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% {
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            }
            50% {
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.7);
            }
        }

        .input-group {
            margin-bottom: 13px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 13px 16px;
            border: none;
            background: #e3e8ef;
            border-radius: 18px ;
            font-size: 14px;
            color: #4a5568;
            box-shadow: 
                inset 6px 6px 12px #bec3c9,
                inset -6px -6px 12px #ffffff;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 
                inset 4px 4px 8px #bec3c9,
                inset -4px -4px 8px #ffffff,
                0 0 0 2px rgba(212, 175, 55, 0.3);
        }

        .input-field::placeholder {
            color: #94a3b8;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 29px;
        }

        select.input-field {
            cursor: pointer;
        }

        select.input-field option {
            background: #e3e8ef;
        }

        textarea.input-field {
            resize: vertical;
            min-height: 65px;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #e3e8ef;
            color: #8B0000;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 
                8px 8px 16px #c72b2b94,
                -8px -8px 16px #ffffff;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            box-shadow: 
                6px 6px 12px #bec3c9,
                -6px -6px 12px #ffffff;
        }

        .submit-btn:active {
            box-shadow: 
                inset 4px 4px 8px #bec3c9,
                inset -4px -4px 8px #ffffff;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(228, 177, 10, 0.15);
            animation: floatCircle 6s ease-in-out infinite;
        }

        @keyframes floatCircle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(10px, 10px) scale(1.1);
            }
        }

        .circle1 {
            width: 180px;
            height: 180px;
            top: -40px;
            right: -40px;
        }

        .circle2 {
            width: 130px;
            height: 130px;
            bottom: -20px;
            left: -20px;
        }

        .price-info {
            text-align: center;
            background: #e3e8ef;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 
                inset 4px 4px 8px #bec3c9,
                inset -4px -4px 8px #ffffff;
        }

        .price-info strong {
            color: #d4af37;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                max-width: 95%;
                border-radius: 25px;
                gap: 0;
            }

            .left-panel,
            .right-panel {
                padding: 25px 20px;
                /* forcer visible — l'overlay est caché sur mobile */
                opacity: 1 !important;
                pointer-events: auto !important;
            }

            .left-panel {
                border-bottom: 3px solid #8B0000;
            }

            /* Cacher l'overlay sliding sur mobile */
            .overlay-container {
                display: none;
            }

            .input-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .form-title {
                font-size: 22px;
            }

            .category-badge {
                display: block;
                text-align: center;
                margin: 0 auto 12px auto;
            }

            .price-info {
                margin-bottom: 12px;
            }

            body::before,
            body::after {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                border-radius: 15px;
            }

            .left-panel,
            .right-panel {
                padding: 20px 15px;
            }

            .submit-btn {
                font-size: 13px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="checkbox" id="toggle">

        <!-- LEFT: Luxury Rooms -->
        <div class="left-panel" id="#rom">
            <div class="category-badge">🛏️ Luxury Rooms</div>
           
            
            <div class="price-info">
                Starting from <strong>190€</strong> per night
            </div>

            <form>
                <div class="input-row">
                    <div class="input-group">
                    <label class="input-label">FULL NAME</label>
                    <input type="text" class="input-field" name="full_name" placeholder="First and last name" required>
                </div>
                <div class="input-group">
                    <label class="input-label">ROOM TYPE</label>
                    <select class="input-field" name="room_type" required>
                        <option value="">Select</option>
                        <option value="deluxe">Chambre Deluxe - 190€</option>
                        <option value="premium">Chambre Premium - 230€</option>
                        <option value="familiale">Chambre Familiale - 300€</option>
                    </select>
                </div>
                </div>
                

                

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">EMAIL</label>
                        <input type="email" class="input-field" name="email" placeholder="Your@email.com" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">PHONE</label>
                        <input type="tel" class="input-field" name="phone" placeholder="+212 6XX" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">Arrival</label>
                        <input type="date" class="input-field" name="check_in" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Departure</label>
                        <input type="date" class="input-field" name="check_out" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">Adults</label>
                        <select class="input-field" name="adults" required>
                            <option value="">Numbre</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">+4</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">CHILDREN</label>
                        <select class="input-field" name="children">
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">+3</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">special requests</label>
                    <textarea class="input-field" name="special_requests" placeholder="Preferences..."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-check-circle"></i> book now
                </button>
            </form>
        </div>
        <!-- RIGHT: Premium Suites -->
        <div class="right-panel" id="#suit">
            <div class="category-badge">👑 Atlas Suite</div>
            <div class="price-info">
                Starting from <strong>190€</strong> per night
            </div>
            <form>
                <div class="input-row">
                    <div class="input-group">
                     <label class="input-label"> suite Type</label>
                     <select class="input-field" name="suite_type" required>
                        <option value="">Select</option>
                        <option value="royale">Suite Royale - 190€</option>
                        <option value="presidentielle">Suite Présidentielle - 280€</option>
                        <option value="penthouse">Suite Penthouse - 350€</option>
                     </select>
                    </div>

                   <div class="input-group">
                    <label class="input-label">full name</label>
                    <input type="text" class="input-field" name="full_name" placeholder="first and last name" required>
                  </div>
                </div>
                

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <input type="email" class="input-field" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">phone</label>
                        <input type="tel" class="input-field" name="phone" placeholder="+212 6XX" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">Arrival</label>
                        <input type="date" class="input-field" name="check_in" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Departure</label>
                        <input type="date" class="input-field" name="check_out" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label class="input-label">Adults</label>
                        <select class="input-field" name="adults" required>
                            <option value="">Numbre</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5+</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Enfants</label>
                        <select class="input-field" name="children">
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">SPECIAL REQUESTS</label>
                    <textarea class="input-field" name="special_requests" placeholder="VIP services, preferences...."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-crown"></i> book now
                </button>
            </form>
        </div>

        <!-- Sliding Overlay -->
        <div class="overlay-container">
            <div class="overlay">
                <!-- Luxury Rooms overlay (shows on RIGHT initially) -->
                <div class="overlay-panel overlay-right">
                    <div class="circle circle1"></div>
                    <div class="circle circle2"></div>
                    <h2>Luxury Rooms</h2>
                    <p>Elegant comfort and refined design for a memorable stay</p>
                    <label for="toggle" class="overlay-btn">
                        <i class="fas fa-bed"></i> Rooms
                    </label>
                </div>

                <!-- Premium Suites overlay (shows on LEFT after click) -->
                <div class="overlay-panel overlay-left">
                    <div class="circle circle1"></div>
                    <div class="circle circle2"></div>
                    <h2>Atlas Suits</h2>
                    <p>Authentic Moroccan luxury and exclusive<br>services for an unforgettable experience</p>
                    <label for="toggle" class="overlay-btn">
                        <i class="fas fa-crown"></i> Suites
                    </label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
